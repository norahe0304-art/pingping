# Canonical repository topology for workspace

[policy]
workspace_root = "/Users/nora/.openclaw/workspace"
canonical_repos_root = "/Users/nora/.openclaw/workspace/projects"
workspace_meta_git = "/Users/nora/.openclaw/workspace/.git"
require_legacy_symlinks = true

